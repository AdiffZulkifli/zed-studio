<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Brek Laju</title>
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">BREK<span>LAJU</span></div>
      <div class="login-subtitle">Admin Control Panel</div>
      <div class="login-badge">🔐 Kawasan Terhad</div>

      <div class="login-error" id="loginError">❌ Kata laluan salah. Cuba lagi.</div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Nama Pengguna</label>
          <input type="text" id="username" class="form-control" placeholder="admin" value="admin" readonly />
        </div>
        <div class="form-group">
          <label for="password">Kata Laluan</label>
          <input type="password" id="password" class="form-control" placeholder="Masukkan kata laluan..." autofocus />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Masuk ke Dashboard →</button>
      </form>

      <p class="login-hint">Demo credentials: <code>123123</code></p>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script>
    // Redirect if already logged in
    if (isAdminLoggedIn()) window.location.href = 'dashboard.html';

    const form = document.getElementById('loginForm');
    const pwField = document.getElementById('password');
    const errBox = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      btn.textContent = 'Memeriksa...';
      btn.disabled = true;

      setTimeout(() => {
        const pw = pwField.value.trim();
        if (adminLogin(pw)) {
          btn.textContent = '✅ Berjaya! Mengalihkan...';
          setTimeout(() => window.location.href = 'dashboard.html', 600);
        } else {
          errBox.classList.add('show');
          pwField.value = '';
          pwField.focus();
          btn.textContent = 'Masuk ke Dashboard →';
          btn.disabled = false;
          // Shake animation
          const card = document.querySelector('.login-card');
          card.style.animation = 'none';
          card.style.transform = 'translateX(-6px)';
          setTimeout(() => { card.style.transform = ''; }, 120);
          setTimeout(() => { card.style.transform = 'translateX(6px)'; }, 240);
          setTimeout(() => { card.style.transform = ''; }, 360);
        }
      }, 500);
    });

    pwField.addEventListener('input', () => errBox.classList.remove('show'));
  </script>
</body>
</html>
