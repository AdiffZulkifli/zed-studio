<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Universities — Admin</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/data.js"></script>
  <script src="../js/admin-auth.js"></script>
</head>
<body class="admin-body">

  <aside class="admin-sidebar" id="sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-sidebar-logo">M</div>
      <div class="admin-sidebar-title">Medic<span>Mesir</span></div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-label">Main Menu</div>
      <a href="dashboard.html" class="admin-nav-link"><i style="font-style:normal">🏠</i> Dashboard</a>
      <div class="admin-nav-label">Content</div>
      <a href="programmes.html" class="admin-nav-link"><i style="font-style:normal">📚</i> Programmes</a>
      <a href="universities.html" class="admin-nav-link active"><i style="font-style:normal">🏛️</i> Universities</a>
      <a href="offices.html" class="admin-nav-link"><i style="font-style:normal">🏢</i> Offices</a>
      <div class="admin-nav-label">Marketing</div>
      <a href="news.html" class="admin-nav-link"><i style="font-style:normal">📰</i> News & Blog</a>
      <a href="promotions.html" class="admin-nav-link"><i style="font-style:normal">🎉</i> Promotions</a>
      <div class="admin-nav-label">System</div>
      <a href="settings.html" class="admin-nav-link"><i style="font-style:normal">⚙️</i> Settings</a>
    </nav>
    <div class="admin-sidebar-footer"><button id="logout-btn" class="btn-logout"><i style="font-style:normal">🚪</i> Logout</button></div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <div>
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem;">
          <div class="hamburger-admin" id="mobile-menu-btn"><span></span><span></span><span></span></div>
          <h1 style="margin:0;">Universities</h1>
        </div>
        <p>Manage partner universities and their details.</p>
      </div>
      <div>
        <button class="btn-admin btn-admin-primary" onclick="openModal()">+ Add University</button>
      </div>
    </div>

    <div class="admin-card" style="padding:0;">
      <div class="admin-table-wrapper" style="margin:0; border-top:none;">
        <table class="admin-table" id="dataTable">
          <thead>
            <tr>
              <th>University</th>
              <th>Country</th>
              <th>Rating</th>
              <th>Status</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- rows rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="formModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Add University</h3>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <form id="dataForm">
          <input type="hidden" id="uni_id" />
          
          <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="uni_name" class="form-control" required placeholder="Cairo University" />
            </div>
            <div class="form-group">
              <label>Country</label>
              <select id="uni_country" class="form-control" required>
                <option value="Egypt">Egypt</option>
                <option value="Russia">Russia</option>
                <option value="Indonesia">Indonesia</option>
                <option value="Ukraine">Ukraine</option>
                <option value="Jordan">Jordan</option>
                <option value="Bulgaria">Bulgaria</option>
              </select>
            </div>
          </div>

          <div class="form-row" style="display:grid; grid-template-columns:80px 80px 1fr; gap:1rem;">
            <div class="form-group">
              <label>Emoji</label>
              <input type="text" id="uni_emoji" class="form-control" required placeholder="🏛️" />
            </div>
            <div class="form-group">
              <label>Flag</label>
              <input type="text" id="uni_flag" class="form-control" required placeholder="🇪🇬" />
            </div>
            <div class="form-group">
              <label>City & Year Est.</label>
              <div style="display:flex;gap:0.5rem">
                  <input type="text" id="uni_city" class="form-control" required placeholder="Cairo" />
                  <input type="text" id="uni_est" class="form-control" required placeholder="1908" />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="uni_desc" class="form-control" style="min-height:80px" required></textarea>
          </div>
          
          <div class="form-group">
            <label>Programmes Offered (Comma separated)</label>
            <input type="text" id="uni_progs" class="form-control" placeholder="MBBS, BDS, Pharmacy" />
          </div>

          <div class="form-row" style="display:grid; grid-template-columns:1fr 100px; gap:1rem;">
            <div class="form-group">
               <label>Badges (Comma separated)</label>
               <input type="text" id="uni_badges" class="form-control" placeholder="MMC Recognised, English Medium" />
            </div>
            <div class="form-group">
               <label>Rating</label>
               <input type="number" step="0.1" max="5" min="1" id="uni_rating" class="form-control" value="4.5" />
            </div>
          </div>

          <div class="form-group" style="display:flex; align-items:center; gap:0.5rem; margin-top:1rem;">
            <input type="checkbox" id="uni_status" checked style="width:18px; height:18px;" />
            <label style="margin:0;">Active (Visible to public)</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-admin btn-admin-outline" onclick="closeModal()">Cancel</button>
        <button class="btn-admin btn-admin-primary" onclick="saveData()">Save University</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    const tb = document.querySelector('#dataTable tbody');
    let allData = [];

    function renderTable() {
      allData = getUniversities(); 
      tb.innerHTML = '';
      if(allData.length === 0) {
        tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">No universities found.</td></tr>';
        return;
      }

      allData.forEach(u => {
        const tr = document.createElement('tr');
        const badge = u.status === 'active' ? '<span class="badge active">Active</span>' : '<span class="badge hidden">Hidden</span>';
        
        tr.innerHTML = `
          <td>
            <div class="td-flex">
              <div class="td-icon" style="background:var(--gold-pale); color:var(--gold); width:40px; height:40px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">${u.emoji}</div>
              <div>
                <div class="td-title">${u.name}</div>
                <div class="td-subtitle">${u.city}, Est. ${u.established}</div>
              </div>
            </div>
          </td>
          <td>${u.flag} ${u.country}</td>
          <td>★ ${u.rating}</td>
          <td>${badge}</td>
          <td style="text-align:right">
            <div class="table-actions" style="justify-content:flex-end">
              <button class="btn-action" onclick="editRow('${u.id}')">✏️</button>
              <button class="btn-action delete" onclick="deleteRow('${u.id}')">🗑️</button>
            </div>
          </td>
        `;
        tb.appendChild(tr);
      });
    }

    function openModal() {
      document.getElementById('dataForm').reset();
      document.getElementById('uni_id').value = '';
      document.getElementById('modalTitle').textContent = 'Add University';
      document.getElementById('formModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('formModal').classList.remove('open');
    }

    function editRow(id) {
      const u = allData.find(x => x.id === id);
      if(!u) return;
      document.getElementById('uni_id').value = u.id;
      document.getElementById('uni_name').value = u.name;
      document.getElementById('uni_country').value = u.country;
      document.getElementById('uni_emoji').value = u.emoji;
      document.getElementById('uni_flag').value = u.flag;
      document.getElementById('uni_city').value = u.city;
      document.getElementById('uni_est').value = u.established;
      document.getElementById('uni_desc').value = u.description;
      document.getElementById('uni_progs').value = Array.isArray(u.programmes) ? u.programmes.join(', ') : u.programmes;
      document.getElementById('uni_badges').value = Array.isArray(u.badges) ? u.badges.join(', ') : u.badges;
      document.getElementById('uni_rating').value = u.rating;
      document.getElementById('uni_status').checked = u.status === 'active';
      
      document.getElementById('modalTitle').textContent = 'Edit University';
      document.getElementById('formModal').classList.add('open');
    }

    function deleteRow(id) {
      if(confirm('Are you sure you want to delete this university?')) {
        deleteUniversity(id);
        showAdminToast('University deleted');
        renderTable();
      }
    }

    function saveData() {
      const form = document.getElementById('dataForm');
      if(!form.checkValidity()) {
        form.reportValidity(); return;
      }

      const strToList = (str) => str.split(',').map(s=>s.trim()).filter(Boolean);

      const payload = {
        name: document.getElementById('uni_name').value,
        country: document.getElementById('uni_country').value,
        emoji: document.getElementById('uni_emoji').value,
        flag: document.getElementById('uni_flag').value,
        city: document.getElementById('uni_city').value,
        established: document.getElementById('uni_est').value,
        description: document.getElementById('uni_desc').value,
        programmes: strToList(document.getElementById('uni_progs').value),
        badges: strToList(document.getElementById('uni_badges').value),
        rating: parseFloat(document.getElementById('uni_rating').value),
        status: document.getElementById('uni_status').checked ? 'active' : 'hidden'
      };

      const id = document.getElementById('uni_id').value;
      if (id) {
        updateUniversity(id, payload);
        showAdminToast('University updated successfully');
      } else {
        createUniversity(payload);
        showAdminToast('University created successfully');
      }

      closeModal();
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
