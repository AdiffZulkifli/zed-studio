<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage News — Admin</title>
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/data.js"></script>
  <script src="../js/admin-auth.js"></script>
</head>
<body class="admin-body">

  <aside class="admin-sidebar" id="sidebar">
    <div class="admin-sidebar-header">
      <div class="admin-sidebar-logo">M</div>
      <div class="admin-sidebar-title">Medic<span>Mesir</span></div>
    </div>
    <nav class="admin-nav">
      <div class="admin-nav-label">Main Menu</div>
      <a href="dashboard.html" class="admin-nav-link"><i style="font-style:normal">🏠</i> Dashboard</a>
      <div class="admin-nav-label">Content</div>
      <a href="programmes.html" class="admin-nav-link"><i style="font-style:normal">📚</i> Programmes</a>
      <a href="universities.html" class="admin-nav-link"><i style="font-style:normal">🏛️</i> Universities</a>
      <a href="offices.html" class="admin-nav-link"><i style="font-style:normal">🏢</i> Offices</a>
      <div class="admin-nav-label">Marketing</div>
      <a href="news.html" class="admin-nav-link active"><i style="font-style:normal">📰</i> News & Blog</a>
      <a href="promotions.html" class="admin-nav-link"><i style="font-style:normal">🎉</i> Promotions</a>
      <div class="admin-nav-label">System</div>
      <a href="settings.html" class="admin-nav-link"><i style="font-style:normal">⚙️</i> Settings</a>
    </nav>
    <div class="admin-sidebar-footer"><button id="logout-btn" class="btn-logout"><i style="font-style:normal">🚪</i> Logout</button></div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <div>
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem;">
          <div class="hamburger-admin" id="mobile-menu-btn"><span></span><span></span><span></span></div>
          <h1 style="margin:0;">News & Announcements</h1>
        </div>
        <p>Publish articles and updates to the blog.</p>
      </div>
      <div>
        <button class="btn-admin btn-admin-primary" onclick="openModal()">+ Write Article</button>
      </div>
    </div>

    <div class="admin-card" style="padding:0;">
      <div class="admin-table-wrapper" style="margin:0; border-top:none;">
        <table class="admin-table" id="dataTable">
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Date</th>
              <th>Status</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- rows rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="formModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Write Article</h3>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <form id="dataForm">
          <input type="hidden" id="news_id" />
          
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="news_title" class="form-control" required placeholder="Article Title" />
          </div>
          
          <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
              <label>Category</label>
              <select id="news_category" class="form-control" required>
                <option value="Announcement">Announcement</option>
                <option value="Graduation">Graduation</option>
                <option value="Guide">Guide</option>
                <option value="Event">Event</option>
              </select>
            </div>
            <div class="form-group">
              <label>Publish Date</label>
              <input type="date" id="news_date" class="form-control" required />
            </div>
          </div>

          <div class="form-row" style="display:grid; grid-template-columns:80px 1fr; gap:1rem;">
            <div class="form-group">
              <label>Emoji</label>
              <input type="text" id="news_emoji" class="form-control" required placeholder="📰" />
            </div>
            <div class="form-group">
              <label>Background Gradient (Image Placeholder)</label>
              <input type="text" id="news_gradient" class="form-control" required placeholder="linear-gradient(135deg,#0D1B2A,#1E3050)" />
            </div>
          </div>

          <div class="form-group">
            <label>Short Excerpt (Shows on cards)</label>
            <textarea id="news_excerpt" class="form-control" style="min-height:60px" required></textarea>
          </div>

          <div class="form-group">
            <label>Full Content</label>
            <textarea id="news_content" class="form-control" style="min-height:150px" required></textarea>
          </div>

          <div class="form-row" style="display:flex; gap:2rem; margin-top:1rem;">
            <div class="form-group" style="display:flex; align-items:center; gap:0.5rem; margin:0;">
              <input type="checkbox" id="news_featured" style="width:18px; height:18px;" />
              <label style="margin:0;">Featured Article</label>
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:0.5rem; margin:0;">
              <input type="checkbox" id="news_status" checked style="width:18px; height:18px;" />
              <label style="margin:0;">Publish immediately (Active)</label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-admin btn-admin-outline" onclick="closeModal()">Cancel</button>
        <button class="btn-admin btn-admin-primary" onclick="saveData()">Save Article</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Default date to today
    document.getElementById('news_date').valueAsDate = new Date();

    const tb = document.querySelector('#dataTable tbody');
    let allData = [];

    function renderTable() {
      allData = getNews(); // from data.js
      tb.innerHTML = '';
      if(allData.length === 0) {
        tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">No news articles.</td></tr>';
        return;
      }

      allData.forEach(n => {
        const tr = document.createElement('tr');
        const badge = n.status === 'published' ? '<span class="badge published">Published</span>' : '<span class="badge draft">Draft</span>';
        const feat  = n.featured ? '⭐ ' : '';
        
        tr.innerHTML = `
          <td>
            <div class="td-flex">
              <div class="td-icon" style="background:${n.gradient}; color:white; width:40px; height:40px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">${n.emoji}</div>
              <div>
                <div class="td-title" style="max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${feat}${n.title}</div>
                <div class="td-subtitle">${n.views || 0} Views</div>
              </div>
            </div>
          </td>
          <td>${n.category}</td>
          <td>${new Date(n.date).toLocaleDateString('en-GB')}</td>
          <td>${badge}</td>
          <td style="text-align:right">
            <div class="table-actions" style="justify-content:flex-end">
              <button class="btn-action" onclick="editRow('${n.id}')">✏️</button>
              <button class="btn-action delete" onclick="deleteRow('${n.id}')">🗑️</button>
            </div>
          </td>
        `;
        tb.appendChild(tr);
      });
    }

    function openModal() {
      document.getElementById('dataForm').reset();
      document.getElementById('news_date').valueAsDate = new Date();
      document.getElementById('news_id').value = '';
      document.getElementById('modalTitle').textContent = 'Write Article';
      document.getElementById('formModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('formModal').classList.remove('open');
    }

    function editRow(id) {
      const n = allData.find(x => x.id === id);
      if(!n) return;
      document.getElementById('news_id').value = n.id;
      document.getElementById('news_title').value = n.title;
      document.getElementById('news_category').value = n.category;
      document.getElementById('news_date').value = n.date;
      document.getElementById('news_emoji').value = n.emoji;
      document.getElementById('news_gradient').value = n.gradient;
      document.getElementById('news_excerpt').value = n.excerpt;
      document.getElementById('news_content').value = n.content;
      document.getElementById('news_featured').checked = n.featured;
      document.getElementById('news_status').checked = n.status === 'published';
      
      document.getElementById('modalTitle').textContent = 'Edit Article';
      document.getElementById('formModal').classList.add('open');
    }

    function deleteRow(id) {
      if(confirm('Are you sure you want to delete this article?')) {
        deleteNewsItem(id);
        showAdminToast('Article deleted');
        renderTable();
      }
    }

    function saveData() {
      const form = document.getElementById('dataForm');
      if(!form.checkValidity()) {
        form.reportValidity(); return;
      }

      const payload = {
        title: document.getElementById('news_title').value,
        category: document.getElementById('news_category').value,
        date: document.getElementById('news_date').value,
        emoji: document.getElementById('news_emoji').value,
        gradient: document.getElementById('news_gradient').value,
        excerpt: document.getElementById('news_excerpt').value,
        content: document.getElementById('news_content').value,
        featured: document.getElementById('news_featured').checked,
        status: document.getElementById('news_status').checked ? 'published' : 'draft'
      };

      const id = document.getElementById('news_id').value;
      if (id) {
        updateNewsItem(id, payload);
        showAdminToast('Article updated successfully');
      } else {
        createNewsItem(payload);
        showAdminToast('Article published successfully');
      }

      closeModal();
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
