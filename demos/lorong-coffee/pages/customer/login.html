<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Lorong Coffee Rewards</title>
  <link rel="stylesheet" href="../../css/style.css"/>
  <link rel="icon" type="image/jpeg" href="../../images/logo.jpg"/>
  <style>
    .auth-page { min-height:100vh; background:var(--cream); display:flex; flex-direction:column; }
    .auth-hero { background:var(--green); padding:8rem 2rem 4rem; text-align:center; }
    .auth-hero__title { font-family:var(--font-display); font-size:2.5rem; font-weight:900; color:var(--cream); }
    .auth-hero__title em { color:var(--yellow); font-style:italic; }
    .auth-hero__sub { color:rgba(255,255,255,0.6); margin-top:0.75rem; font-size:1rem; }

    .auth-card {
      background:white; border-radius:24px; padding:2.5rem;
      max-width:420px; width:100%; margin:-2rem auto 4rem;
      box-shadow:0 20px 60px rgba(0,0,0,0.12);
      position:relative; z-index:1;
    }
    .auth-label { display:block; font-size:0.8rem; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.5rem; }
    .auth-input {
      width:100%; border:2px solid #e8e0d0; border-radius:10px; padding:12px 16px;
      font-family:var(--font-body); font-size:0.95rem; color:var(--dark); outline:none;
      transition:border-color 0.2s; background:white; margin-bottom:1.1rem;
    }
    .auth-input:focus { border-color:var(--green); }
    .auth-input::placeholder { color:#bbb; }
    .auth-btn {
      width:100%; background:var(--green); color:var(--yellow); border:none; border-radius:12px;
      padding:14px; font-family:var(--font-display); font-size:1.05rem; font-weight:700;
      cursor:pointer; transition:background 0.2s, transform 0.15s; margin-top:0.5rem;
    }
    .auth-btn:hover { background:var(--green-mid); transform:translateY(-1px); }
    .auth-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .auth-error { background:#fde8ea; border:1px solid #f5c6cb; border-radius:8px; padding:10px 14px; color:#c0392b; font-size:0.85rem; margin-bottom:1rem; display:none; }
    .auth-link { text-align:center; margin-top:1.5rem; font-size:0.88rem; color:var(--text-muted); }
    .auth-link a { color:var(--green); font-weight:700; text-decoration:none; }
    .auth-link a:hover { text-decoration:underline; }
    .divider { text-align:center; color:#ccc; font-size:0.82rem; margin:1.25rem 0; position:relative; }
    .divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:#e8e0d0; }
    .divider span { position:relative; background:white; padding:0 0.75rem; }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <a href="../../index.html" class="navbar__logo">
    <img src="../../images/logo.jpg" alt="Lorong Coffee"/>
    <span>Lorong Coffee</span>
  </a>
  <ul class="navbar__links">
    <li><a href="../menu.html">Menu</a></li>
    <li><a href="../rewards.html">Rewards</a></li>
    <li><a href="../stores.html">Find a Store</a></li>
    <li><a href="register.html" class="navbar__cta">Join Free</a></li>
  </ul>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="auth-page">
  <div class="auth-hero">
    <div class="section-label" style="justify-content:center;color:rgba(255,255,255,0.5);">Member Portal</div>
    <h1 class="auth-hero__title">Welcome <em>Back</em></h1>
    <p class="auth-hero__sub">Sign in to track your cups and check your reward.</p>
  </div>

  <div class="auth-card">
    <h2 style="font-family:var(--font-display);font-size:1.4rem;color:var(--green);margin-bottom:1.5rem;text-align:center;">Sign In to Your Account</h2>

    <div class="auth-error" id="authError"></div>

    <form id="loginForm">
      <label class="auth-label">Email Address</label>
      <input class="auth-input" type="email" id="fieldEmail" placeholder="your@email.com" autocomplete="email" required/>

      <label class="auth-label">Password</label>
      <input class="auth-input" type="password" id="fieldPassword" placeholder="Your password" autocomplete="current-password" required/>

      <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="auth-link" style="margin-top:0;">
      New customer? <a href="register.html">Join Lorong Rewards — Free!</a>
    </div>
    <div class="auth-link">
      <a href="../../index.html" style="color:var(--text-muted);font-weight:400;">← Back to Website</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/supabase-client.js"></script>
<script src="../../js/data.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/main.js"></script>
<script>
  if (getCustomerSession()) window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errEl = document.getElementById('authError');
    errEl.style.display = 'none';

    const email = document.getElementById('fieldEmail').value;
    const password = document.getElementById('fieldPassword').value;

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    const result = await customerSignIn(email, password);

    if (result.success) {
      window.location.href = 'dashboard.html';
    } else {
      errEl.textContent = result.error;
      errEl.style.display = 'block';
      document.getElementById('fieldPassword').value = '';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
